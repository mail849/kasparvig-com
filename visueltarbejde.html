<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visuelt arbejde – Kaspar Vig</title>

  <style>
    body {
      margin: 0;
      background: #111111;
      color: #ede7db;
      font-family: Georgia, serif;
      line-height: 1.6;
    }

    h1 {
      font-family: "Courier New", monospace;
      font-size: 4rem;
      font-weight: bold;
      color: white;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 12px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    section {
      max-width: 1000px;
      margin: auto;
      padding: 80px 20px;
    }

    h2 {
      font-size: 2rem;
      font-weight: normal;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .gallery img {
      width: 100%;
      display: block;
      border-radius: 4px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #777;
    }
  </style>
</head>

<body>

<header
  style="
    position: relative;
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  "
>

  <img
    src="forside.jpg"
    alt="Kaspar Vig"
    style="
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    "
  >

  <div
    style="
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
    "
  ></div>

  <div
    style="
      position:relative;
      z-index:2;
      text-align:center;
      color:white;
      padding:20px;
    "
  >

    <h1>Visuelt arbejde</h1>

    <p style="font-size:1.2rem; opacity:.9; margin:20px 0;">
      Fotografi • Film • Installation
    </p>

    <nav>
      <a href="index.html">← Forside</a>
    </nav>

  </div>

</header>

<section>

  <h2>Udvalgte projekter</h2>

  <p>
    Visuelle værker i krydsfeltet mellem fotografi,
    film og installatoriske formater.
  </p>

  <div class="gallery">

    <img src="forside.jpg" alt="Projekt">

    <img src="forside.jpg" alt="Projekt">

    <img src="forside.jpg" alt="Projekt">

  </div>

</section>

<footer>
  © 2026 Kaspar Vig
</footer>

</body>
</html>
